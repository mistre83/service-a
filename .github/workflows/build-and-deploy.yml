name: "[User] Deploy to Test"
run-name: "Build ${{ inputs.branch }} → Deploy to ${{ inputs.environment }}"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and deploy'
        required: true
        default: 'main'
      environment:
        description: 'Target environment'
        required: true
        default: 'test'
        type: choice
        options:
          - test

permissions:
  id-token: write
  contents: write

jobs:
  build:
    name: Build (${{ inputs.branch }})
    uses: mistre83/shared-workflows/.github/workflows/build.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      branch: ${{ inputs.branch }}
    secrets: inherit

  deploy:
    name: Deploy to ${{ inputs.environment }}
    needs: build
    uses: mistre83/shared-workflows/.github/workflows/deploy.yml@main
    permissions:
      id-token: write
      contents: read
    with:
      environment: ${{ inputs.environment }}
      image_tag: ${{ needs.build.outputs.image_tag }}
      branch: ${{ needs.build.outputs.branch }}
    secrets: inherit
